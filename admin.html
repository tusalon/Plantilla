    <script>
        (function() {
            const isAdmin = localStorage.getItem('adminAuth') === 'true';
            const barberoAuth = localStorage.getItem('barberoAuth');
            
            console.log('🔐 Verificando autenticación:', { isAdmin, barberoAuth: !!barberoAuth });
            console.log('🔐 SUPABASE_URL en auth:', window.SUPABASE_URL);
            
            // Si no hay sesión, redirigir a index.html (ClientAuthScreen)
            if (!isAdmin && !barberoAuth) {
                console.log('🚫 No hay sesión, redirigiendo a ClientAuthScreen');
                window.location.href = 'index.html';
                return;
            }
            
            // Verificar sesión de admin (8 horas de duración)
            if (isAdmin) {
                const loginTime = localStorage.getItem('adminLoginTime');
                const isValidSession = loginTime && (Date.now() - parseInt(loginTime)) < 8 * 60 * 60 * 1000;
                
                if (!isValidSession) {
                    localStorage.removeItem('adminAuth');
                    localStorage.removeItem('adminUser');
                    localStorage.removeItem('adminLoginTime');
                    window.location.href = 'index.html';
                }
                return;
            }
            
            // Si es barbero, continuar
            if (barberoAuth) {
                console.log('👨‍🎨 Acceso como barbero');
                return;
            }
        })();
    </script>

    <!-- Sistema de actualizaciones para admin (UNO SOLO) -->
    <script>
        let swRegistration = null;
        let updateNotificationShown = false;

        function showUpdateNotification() {
            if (updateNotificationShown) return;
            
            const banner = document.createElement('div');
            banner.id = 'update-notification';
            banner.className = 'fixed bottom-4 left-4 right-4 bg-amber-600 text-white p-4 rounded-lg shadow-lg z-50 max-w-md mx-auto';
            banner.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="text-2xl">✂️</div>
                    <div class="flex-1">
                        <div class="font-bold">¡Nueva versión disponible!</div>
                        <div class="text-sm text-amber-100">Actualizamos LAG.barberia con mejoras</div>
                    </div>
                    <button onclick="updateApp()" class="bg-white text-amber-600 px-4 py-2 rounded-lg font-bold hover:bg-amber-50 transition">
                        Actualizar
                    </button>
                </div>
            `;
            document.body.appendChild(banner);
            updateNotificationShown = true;
        }

        window.updateApp = () => {
            const notification = document.getElementById('update-notification');
            if (notification) notification.remove();
            
            const reloadMsg = document.createElement('div');
            reloadMsg.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-[10000]';
            reloadMsg.innerHTML = `
                <div class="bg-amber-600 text-white p-6 rounded-2xl shadow-2xl text-center max-w-xs mx-4">
                    <div class="animate-spin h-12 w-12 border-4 border-white border-t-transparent rounded-full mx-auto mb-4"></div>
                    <h3 class="text-xl font-bold mb-2">Actualizando...</h3>
                    <p class="text-amber-100">La app se recargará automáticamente</p>
                </div>
            `;
            document.body.appendChild(reloadMsg);
            
            if (swRegistration && swRegistration.waiting) {
                swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
            }
            
            setTimeout(() => {
                window.location.reload();
            }, 2000);
        };

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/LAG-barberia/sw.js')
                    .then(registration => {
                        swRegistration = registration;
                        console.log('✅ Service Worker registrado en admin');

                        if (registration.waiting) {
                            showUpdateNotification();
                        }

                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    showUpdateNotification();
                                }
                            });
                        });
                    });

                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    console.log('🔄 Service Worker cambiado, recargando admin...');
                    window.location.reload();
                });
            });

            setInterval(() => {
                if (swRegistration) {
                    swRegistration.update();
                }
            }, 30 * 60 * 1000);
        }
    </script>
