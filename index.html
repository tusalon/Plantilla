<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAG.barberia - Reserva de Turnos</title>
    <meta name="description" content="Reservá tu turno en LAG.barberia fácil y rápido">

    <link rel="manifest" href="/LAG-barberia/manifest.json">
    <meta name="theme-color" content="#c49b63">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="LAG.barberia">
    <link rel="apple-touch-icon" href="/LAG-barberia/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/LAG-barberia/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/LAG-barberia/icons/icon-512x512.png">
    
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">
    
    <style type="text/tailwindcss">
        @layer utilities {
            .animate-fade-in {
                animation: fadeIn 0.5s ease-out forwards;
            }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Scripts con rutas relativas -->
    <script type="text/javascript" src="utils/supabase-config.js"></script>
    <script type="text/javascript" src="utils/storage.js"></script>
    <script type="text/javascript" src="utils/api.js"></script>
    <script type="text/javascript" src="utils/timeLogic.js"></script>
    <script type="text/javascript" src="utils/auth-clients.js"></script>
    <script type="text/javascript" src="utils/auth-barberos.js"></script>
    <script type="text/javascript" src="utils/config.js"></script>
    <script type="text/javascript" src="utils/servicios.js"></script>
    <script type="text/javascript" src="utils/barberos.js"></script>
    <script type="text/javascript" src="utils/whatsapp-helper.js"></script>

    <!-- Componentes de clientes -->
    <script type="text/babel" src="components/Header.js"></script>
    <script type="text/babel" src="components/ServiceSelection.js"></script>
    <script type="text/babel" src="components/WorkerSelector.js"></script>
    <script type="text/babel" src="components/Calendar.js"></script>
    <script type="text/babel" src="components/TimeSlots.js"></script>
    <script type="text/babel" src="components/BookingForm.js"></script>
    <script type="text/babel" src="components/Confirmation.js"></script>
    <script type="text/babel" src="components/WelcomeScreen.js"></script>
    <script type="text/babel" src="components/WhatsAppButton.js"></script>
    <script type="text/babel" src="components/ClientAuthScreen.js"></script>
    <script type="text/babel" src="components/MyBookings.js"></script>
    
    <!-- App de clientes -->
    <script type="text/babel" src="client-app.js"></script>

    <!-- Sistema de actualizaciones para clientes (UNO SOLO) -->
    <script>
        let swRegistration = null;
        let updateNotificationShown = false;

        function showUpdateNotification() {
            if (updateNotificationShown) return;
            
            const banner = document.createElement('div');
            banner.id = 'update-notification';
            banner.className = 'fixed bottom-4 left-4 right-4 bg-amber-600 text-white p-4 rounded-lg shadow-lg z-50 max-w-md mx-auto';
            banner.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="text-2xl">✂️</div>
                    <div class="flex-1">
                        <div class="font-bold">¡Nueva versión disponible!</div>
                        <div class="text-sm text-amber-100">Actualizamos LAG.barberia con mejoras</div>
                    </div>
                    <button onclick="updateApp()" class="bg-white text-amber-600 px-4 py-2 rounded-lg font-bold hover:bg-amber-50 transition">
                        Actualizar
                    </button>
                </div>
            `;
            document.body.appendChild(banner);
            updateNotificationShown = true;
        }

        window.updateApp = () => {
            const notification = document.getElementById('update-notification');
            if (notification) notification.remove();
            
            const reloadMsg = document.createElement('div');
            reloadMsg.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-[10000]';
            reloadMsg.innerHTML = `
                <div class="bg-amber-600 text-white p-6 rounded-2xl shadow-2xl text-center max-w-xs mx-4">
                    <div class="animate-spin h-12 w-12 border-4 border-white border-t-transparent rounded-full mx-auto mb-4"></div>
                    <h3 class="text-xl font-bold mb-2">Actualizando...</h3>
                    <p class="text-amber-100">La app se recargará automáticamente</p>
                </div>
            `;
            document.body.appendChild(reloadMsg);
            
            if (swRegistration && swRegistration.waiting) {
                swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
            }
            
            setTimeout(() => {
                window.location.reload();
            }, 2000);
        };

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/LAG-barberia/sw.js')
                    .then(registration => {
                        swRegistration = registration;
                        console.log('✅ Service Worker registrado en clientes');

                        if (registration.waiting) {
                            showUpdateNotification();
                        }

                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    showUpdateNotification();
                                }
                            });
                        });
                    });

                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    console.log('🔄 Service Worker cambiado, recargando...');
                    window.location.reload();
                });
            });

            setInterval(() => {
                if (swRegistration) {
                    swRegistration.update();
                }
            }, 30 * 60 * 1000);
        }
    </script>
</body>
</html>
